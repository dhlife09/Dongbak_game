<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Move Game - Ranking</title>
    <!-- 웹폰트 적용: Pretendard 및 Noto Color Emoji -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Noto Color Emoji', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #1e293b;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* 왼쪽 섹션 */
        .left-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .title {
            font-size: 3.5rem; 
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: #0369a1; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* 내 기록 및 이름 입력 카드 */
        .my-record-card {
            background: #ffffff;
            padding: 2rem;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            border: 2px solid #0ea5e9;
            width: 100%;
            max-width: 500px;
        }

        .my-record-label {
            font-size: 1.2rem;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .my-record-value {
            font-size: 3rem;
            font-weight: 800;
            color: #0ea5e9;
            margin-bottom: 1.5rem;
        }

        /* 이름 입력 폼 */
        .name-input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        #playerNameInput {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            font-size: 1.2rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #playerNameInput:focus {
            border-color: #0ea5e9;
        }

        .save-button {
            padding: 0 1.5rem;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* 랭킹 리스트 박스 */
        .rank-box {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 32px;
            border: 1px solid #ffffff;
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .rank-box h3 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #0369a1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #rankList {
            list-style: none;
            text-align: left;
        }

        #rankList li {
            font-size: 1.6rem;
            padding: 0.8rem 1.5rem;
            margin-bottom: 0.5rem;
            background: white;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            color: #334155;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            align-items: center;
        }

        #rankList li:nth-child(1) {
            background: #fffbeb;
            border: 1px solid #fcd34d;
            font-weight: 700;
        }

        .restart-button {
            padding: 1.2rem 4rem;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            border: none;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.4);
        }

        .restart-button:hover {
            transform: translateY(-5px);
        }

        /* 오른쪽 섹션 */
        .right-section {
            flex: 0.85; 
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 1px solid #e2e8f0;
            padding: 30px;
        }

        .poster-image {
            max-width: 100%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-section">
            <h1 class="title">🏆 Ranking</h1>
            
            <div class="my-record-card">
                <p class="my-record-label">Your Record</p>
                <p class="my-record-value"><span id="myRecord">0.00</span>s</p>
                
                <!-- 이름 입력 창: 신규 기록일 때만 표시 -->
                <div id="nameEntrySection">
                    <p style="margin-bottom: 10px; font-weight: 600;">랭킹에 등록할 이름을 입력하세요!</p>
                    <div class="name-input-group">
                        <input type="text" id="playerNameInput" placeholder="이름 (최대 8자)" maxlength="8">
                        <button class="save-button" onclick="saveRank()">등록</button>
                    </div>
                </div>
            </div>

            <div class="rank-box">
                <h3>🥇 Top 5</h3>
                <ol id="rankList"></ol>
            </div>
            
            <button class="restart-button" onclick="restart()">다시 도전하기</button>
        </div>

        <div class="right-section">
            <img src="poster.png" alt="동아리 홍보 포스터" class="poster-image">
        </div>
    </div>

    <script>
        // 🔐 기존 로직 유지: 게임 클리어 여부 및 내 기록 불러오기
        const cleared = localStorage.getItem("gameCleared");
        const myRecord = localStorage.getItem("lastRecord") || "0.00";
        document.getElementById("myRecord").textContent = myRecord;

        // 이름 입력 섹션 노출 제어
        if (cleared !== "true") {
            document.getElementById("nameEntrySection").style.display = "none";
            // 비정상 접근 시 리다이렉트 (기존 로직 유지)
            if (!localStorage.getItem("lastRecord")) {
                location.href = "start.html";
            }
        }

        // 랭킹 리스트 불러오기 및 표시 함수 (기존 랭킹 표시 로직을 객체 지향으로 확장)
        function updateRankDisplay() {
            const ranks = JSON.parse(localStorage.getItem("ranks")) || [];
            const rankList = document.getElementById("rankList");
            rankList.innerHTML = "";

            // 기록 순 정렬 (객체 {name, time} 및 기존 숫자 데이터 모두 대응)
            ranks.sort((a, b) => {
                const timeA = typeof a === 'object' ? a.time : a;
                const timeB = typeof b === 'object' ? b.time : b;
                return timeA - timeB;
            });

            // 상위 5개 표시
            ranks.slice(0, 5).forEach((item, index) => {
                const li = document.createElement("li");
                const medal = index === 0 ? "🥇 " : index === 1 ? "🥈 " : index === 2 ? "🥉 " : (index + 1) + ". ";
                
                // 데이터 타입에 따른 이름 및 시간 추출 (호환성 유지)
                const displayName = typeof item === 'object' ? item.name : "Player";
                const displayTime = typeof item === 'object' ? item.time : item;

                li.innerHTML = `<span>${medal} ${displayName}</span> <span>${displayTime}s</span>`;
                rankList.appendChild(li);
            });

            if (ranks.length === 0) {
                rankList.innerHTML = "<p style='text-align:center; color:#94a3b8;'>아직 기록이 없습니다.</p>";
            }
        }

        // 신규 기능: 이름 저장 함수
        function saveRank() {
            const nameInput = document.getElementById("playerNameInput");
            const name = nameInput.value.trim() || "Player";
            const time = parseFloat(myRecord);

            const ranks = JSON.parse(localStorage.getItem("ranks")) || [];
            
            // 신규 기록 객체 추가
            ranks.push({ name: name, time: time });
            
            // 로컬 스토리지 업데이트 및 상태값 초기화
            localStorage.setItem("ranks", JSON.stringify(ranks));
            localStorage.removeItem("gameCleared"); 

            // UI 즉시 업데이트
            document.getElementById("nameEntrySection").style.display = "none";
            updateRankDisplay();
        }

        // 초기 화면 업데이트 (기존 실행부 유지)
        updateRankDisplay();

        // 다시 시작 로직 유지
        function restart() {
            localStorage.removeItem("gameCleared");
            location.href = "start.html";
        }
    </script>
</body>
</html>
